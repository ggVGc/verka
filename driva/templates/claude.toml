description = "Run Claude Code interactively against the current project"
command = ["claude", "--dangerously-skip-permissions"]
path = ["~/.local/bin"]
backend = "bwrap"
network = true
interactive = true

[environment]
DISABLE_AUTOUPDATER = "1"

[[mount]]
source = "~/.local/share"
access = "read"

[[mount]]
source = "~/.claude"
access = "write"

[[mount]]
source = "~/.claude.json"
access = "write"
