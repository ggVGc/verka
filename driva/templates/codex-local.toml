description = "Run the host's Codex binary interactively in Bubblewrap"
command = ["codex", "-c", 'projects."/tmp/workspace".trust_level="trusted"', "--sandbox", "danger-full-access"]
backend = "bwrap"
rootfs = "/"
tmpfs = ["~", "/root"]
workdir = "/tmp/workspace"
network = true
interactive = true

[environment]
HOME = "/root"
TERM = "xterm-256color"

[[mount]]
source = "."
destination = "/tmp/workspace"
access = "write"

[[mount]]
source = "~/.codex/auth.json"
destination = "/root/.codex/auth.json"
access = "write"
