description = "Run OpenAI Codex non-interactively against the current project"
command = [
    "/bin/sh",
    "-c",
    '''
workspace=$(pwd -P)
exec codex \
    -c "projects.\"$workspace\".trust_level=\"trusted\"" \
    --sandbox danger-full-access \
    exec --skip-git-repo-check \
    "$@"
''',
    "driva-codex-exec",
]
backend = "bwrap"
rootfs = "/"
tmpfs = ["~", "/root"]
network = true
interactive = false

[[workspace-mount]]
source = "."
access = "write"

[environment]
HOME = "/root"
TERM = "xterm-256color"

[[mount]]
source = "~/.codex/auth.json"
destination = "/root/.codex/auth.json"
access = "write"
