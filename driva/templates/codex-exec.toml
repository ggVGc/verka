description = "Run OpenAI Codex non-interactively against the current project"
command = ["codex", "--sandbox", "danger-full-access", "exec", "--skip-git-repo-check"]
backend = "bwrap"
rootfs = "/"
tmpfs = ["~", "/root"]
workspace_root = "/tmp/driva"
codex_trust_workspace = true
network = true
interactive = false

[environment]
HOME = "/root"
TERM = "xterm-256color"

[[mount]]
source = "~/.codex/auth.json"
destination = "/root/.codex/auth.json"
access = "write"
