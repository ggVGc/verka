description = "Run OpenAI Codex interactively against the current project"
command = ["/usr/local/bin/driva-codex", "--sandbox", "danger-full-access"]
backend = "bwrap"
rootfs = "~/.local/share/driva/runtimes/codex/current/rootfs"
network = true
interactive = true

[[workspace-mount]]
source = "."
destination = "/driva"
access = "write"

[environment]
HOME = "/root"
TERM = "xterm-256color"

[[mount]]
kind = "temporary"
destination = "/root/.codex"

[[mount]]
source = "/etc/resolv.conf"
destination = "/etc/resolv.conf"
access = "read"

[[mount]]
source = "~/.codex/auth.json"
destination = "/root/.codex/auth.json"
access = "write"
