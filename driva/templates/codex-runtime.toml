description = "Run OpenAI Codex interactively against the current project"
command = [
    "/bin/sh",
    "-c",
    '''
workspace=$(pwd -P)
exec /usr/local/bin/driva-codex \
    -c "projects.\"$workspace\".trust_level=\"trusted\"" \
    --sandbox danger-full-access \
    "$@"
''',
    "driva-codex-runtime",
]
backend = "bwrap"
rootfs = "~/.local/share/driva/runtimes/codex/current/rootfs"
tmpfs = ["/root/.codex", "/driva"]
network = true
interactive = true

[[workspace-mount]]
source = "."
destination = "/driva"
access = "write"

[environment]
HOME = "/root"
TERM = "xterm-256color"

[[mount]]
source = "/etc/resolv.conf"
destination = "/etc/resolv.conf"
access = "read"

[[mount]]
source = "~/.codex/auth.json"
destination = "/root/.codex/auth.json"
access = "write"
