description = "Run Claude Code non-interactively against the current project"
command = ["npx", "--yes", "@anthropic-ai/claude-code@latest", "--print"]
backend = "podman"
image = "docker.io/library/node:22-bookworm"
network = true
interactive = false

[[workspace-mount]]
source = "."
access = "write"

[environment]
DISABLE_AUTOUPDATER = "1"

[[mount]]
source = "~/.claude/.credentials.json"
destination = "/root/.claude/.credentials.json"
access = "write"
