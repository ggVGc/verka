description = "Run the host's Codex binary interactively in Bubblewrap"
command = ["codex", "--sandbox", "danger-full-access"]
backend = "bwrap"
rootfs = "/"
tmpfs = ["~", "/root"]
codex_trust_workspace = true
network = true
interactive = true

[[workspace-mount]]
source = "."
access = "write"

[environment]
HOME = "/root"
TERM = "xterm-256color"

[[mount]]
source = "~/.codex"
destination = "/root/.codex"
access = "write"

# [[mount]]
# source = "~/.codex/auth.json"
# destination = "/root/.codex/auth.json"
# access = "write"
