description = "Run the host's Codex binary interactively in Bubblewrap"
command = [
    "/bin/sh",
    "-c",
    '''
workspace=$(pwd -P)
exec codex \
    -c "projects.\"$workspace\".trust_level=\"trusted\"" \
    --sandbox danger-full-access \
    "$@"
''',
    "driva-codex",
]
backend = "bwrap"
rootfs = "/"
tmpfs = ["~", "/root"]
network = true
interactive = true

[[workspace-mount]]
source = "."
access = "write"

[environment]
HOME = "/root"
TERM = "xterm-256color"

[[mount]]
source = "~/.codex"
destination = "/root/.codex"
access = "write"

# [[mount]]
# source = "~/.codex/auth.json"
# destination = "/root/.codex/auth.json"
# access = "write"
