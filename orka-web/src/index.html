<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>orka — workbench</title>
<style>
  :root {
    --page:        #f9f9f7;
    --surface:     #fcfcfb;
    --ink:         #0b0b0b;
    --ink-2:       #52514e;
    --muted:       #898781;
    --hairline:    #e1e0d9;
    --border:      rgba(11, 11, 11, 0.10);

    --open:        #2a78d6;  --open-bg:   #e3edfb;  --open-ink:   #1c5cab;
    --done:        #0ca30c;  --done-bg:   #e2f4e2;  --done-ink:   #006300;
    --failed:      #d03b3b;  --failed-bg: #fbe4e4;  --failed-ink: #a32c2c;
    --ready:       #2a78d6;  --ready-bg:  #e3edfb;  --ready-ink:  #1c5cab;
    --complete:    #0ca30c;  --complete-bg:#e2f4e2; --complete-ink:#006300;
    --awaiting:    #8b5ac2;  --awaiting-bg:#f0e7fa; --awaiting-ink:#60348f;
    --blocked:     #d03b3b;  --blocked-bg:#fbe4e4;  --blocked-ink:#a32c2c;
    --stale-bg:    #fdf1d7;  --stale-ink: #8a5a00;
    --edge:        #b9b7ae;
    --edge-derived:#c9c7be;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--ink);
    background: var(--page);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--hairline);
  }
  header h1 { font-size: 15px; font-weight: 650; }
  header h1 span { color: var(--muted); font-weight: 400; }
  #workbench { color: var(--muted); font: 11.5px/1.3 ui-monospace, monospace;
               max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 10px; border-radius: 999px;
    background: var(--page); border: 1px solid var(--hairline);
    color: var(--ink-2); font-size: 12.5px; white-space: nowrap;
  }
  .chip b { color: var(--ink); font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  #legend { margin-left: auto; display: flex; gap: 14px; align-items: center;
            color: var(--muted); font-size: 12px; flex-wrap: wrap; }
  #legend .item { display: inline-flex; align-items: center; gap: 5px; }
  #legend svg { display: block; }
  #refresh { width: 7px; height: 7px; border-radius: 50%; background: var(--hairline);
             transition: background .3s; flex: none; }
  #refresh.live { background: var(--done); }
  #refresh.err  { background: var(--failed); }

  #problems {
    display: none;
    padding: 8px 16px;
    background: var(--stale-bg); color: var(--stale-ink);
    border-bottom: 1px solid var(--hairline);
    font-size: 13px; white-space: pre-wrap;
  }

  main { flex: 1; display: flex; min-height: 0; }
  #canvas { flex: 1; position: relative; min-width: 0; }
  #svg { width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
  #svg.panning { cursor: grabbing; }
  #empty {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    color: var(--muted); pointer-events: none;
  }

  .edge { fill: none; stroke: var(--edge); stroke-width: 1.5; }
  .edge.derived { stroke: var(--edge-derived); stroke-dasharray: 5 4; }
  .edge.hi { stroke: var(--ink-2); stroke-width: 2; }
  .edge.dim { opacity: 0.25; }

  .card {
    width: 100%; height: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--muted);
    border-radius: 8px;
    padding: 8px 10px 7px;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(11,11,11,0.04);
    overflow: hidden;
    display: flex; flex-direction: column; gap: 4px;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(11,11,11,0.10); }
  .card.sel { outline: 2px solid var(--open); outline-offset: 1px; }
  .card.dim { opacity: 0.35; }
  .card.status-ready                { border-left-color: var(--ready); }
  .card.status-complete             { border-left-color: var(--complete); }
  .card.status-awaiting_integration { border-left-color: var(--awaiting); }
  .card.status-blocked,
  .card.status-error                { border-left-color: var(--blocked); }
  .card .title {
    font-weight: 600; font-size: 12.5px; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .tags { display: flex; gap: 4px; flex-wrap: nowrap; overflow: hidden; margin-top: auto; flex: none; }
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10.5px; font-weight: 600;
    padding: 1px 7px; border-radius: 999px; white-space: nowrap;
  }
  .pill .dot { width: 6px; height: 6px; }
  .pill.ready                { background: var(--ready-bg);    color: var(--ready-ink); }
  .pill.complete             { background: var(--complete-bg); color: var(--complete-ink); }
  .pill.awaiting_integration { background: var(--awaiting-bg); color: var(--awaiting-ink); }
  .pill.blocked,
  .pill.error                { background: var(--blocked-bg);  color: var(--blocked-ink); }
  .pill.stale  { background: var(--stale-bg);  color: var(--stale-ink); }
  .pill.human  { background: var(--page); color: var(--ink-2); border: 1px solid var(--hairline); }
  .pill.machine { background: var(--open-bg); color: var(--open-ink); border: 1px solid #c8dcf6; }
  button.pill.logbtn {
    margin-left: auto; cursor: pointer;
    font: inherit; font-size: 10.5px; font-weight: 600;
    background: var(--page); color: var(--open-ink);
    border: 1px solid var(--hairline);
  }
  button.pill.logbtn:hover { border-color: var(--open); background: var(--open-bg); }

  #panel {
    width: 360px; flex: none;
    background: var(--surface);
    border-left: 1px solid var(--hairline);
    overflow-y: auto;
    padding: 16px;
    display: none;
  }
  #panel.show { display: block; }
  #panel h2 { font-size: 15px; line-height: 1.35; margin-bottom: 2px; overflow-wrap: anywhere; }
  #panel .nid { color: var(--muted); font-size: 11.5px; font-family: ui-monospace, monospace;
                overflow-wrap: anywhere; }
  #panel .tags { display: flex; gap: 5px; flex-wrap: wrap; margin: 10px 0 4px; }
  #panel .pill { font-size: 11.5px; padding: 2px 9px; }
  #panel section { margin-top: 14px; }
  #panel section > h3 {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted); margin-bottom: 5px;
  }
  #panel .kv { display: grid; grid-template-columns: max-content 1fr; gap: 2px 10px;
               font-size: 13px; color: var(--ink-2); }
  #panel .kv dt { color: var(--muted); }
  #panel .kv dd { overflow-wrap: anywhere; }
  #panel pre {
    font: 12px/1.5 ui-monospace, monospace;
    background: var(--page); border: 1px solid var(--hairline); border-radius: 6px;
    padding: 8px 10px; white-space: pre-wrap; overflow-wrap: anywhere;
  }
  #panel .prose { white-space: pre-wrap; font-size: 13px; color: var(--ink-2);
                  overflow-wrap: anywhere; }
  #panel ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  #panel .reason { font-size: 12.5px; color: var(--stale-ink); background: var(--stale-bg);
                   border-radius: 6px; padding: 4px 8px; overflow-wrap: anywhere; }
  #panel textarea {
    width: 100%; min-height: 90px; resize: vertical;
    font: 13px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--ink); background: var(--page);
    border: 1px solid var(--hairline); border-radius: 6px;
    padding: 8px 10px;
  }
  #panel textarea:focus { outline: none; border-color: var(--open); }
  #panel .respond-send {
    margin-top: 8px; cursor: pointer;
    font: inherit; font-size: 12.5px; font-weight: 600;
    padding: 5px 14px; border-radius: 6px;
    background: var(--open-bg); color: var(--open-ink);
    border: 1px solid var(--open);
  }
  #panel .respond-send:hover { background: var(--open); color: #fff; }
  #panel .respond-send:disabled { opacity: 0.5; cursor: default; }
  #panel .respond-err { margin-top: 6px; font-size: 12.5px; color: var(--failed-ink); }
  .nodelink {
    font: 12.5px/1.4 ui-monospace, monospace;
    display: block; width: 100%; text-align: left;
    background: var(--page); border: 1px solid var(--hairline); border-radius: 6px;
    padding: 4px 8px; color: var(--open-ink); cursor: pointer;
    overflow-wrap: anywhere;
  }
  .nodelink:hover { border-color: var(--open); }
  .nodelink small { color: var(--muted); font-family: system-ui, sans-serif; display: block; }
  .attempt-list { display: flex; flex-direction: column; gap: 5px; }
  .attempt {
    border: 1px solid var(--hairline); border-radius: 6px; padding: 7px 8px;
    background: var(--page); color: var(--ink-2); font-size: 12px;
  }
  .attempt-head { display: flex; align-items: center; gap: 6px; }
  .attempt-head code { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .attempt-meta { color: var(--muted); margin-top: 2px; }
  .attempt button { border: 0; background: none; color: var(--open-ink); cursor: pointer;
                    padding: 0; font: inherit; font-weight: 600; }
  /* work log view (left side) */
  #logview {
    width: min(520px, 45vw); flex: none;
    background: var(--surface);
    border-right: 1px solid var(--hairline);
    display: none; flex-direction: column; min-width: 0;
  }
  #logview.show { display: flex; }
  #logview .loghead {
    display: flex; align-items: baseline; gap: 8px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--hairline);
  }
  #logview .loghead h2 {
    font-size: 13px; font-weight: 600; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #logview .loghead h2 span { color: var(--muted); font-weight: 400; }
  #logview .loghead h2 em { font-style: normal; }
  #logview .logbody { flex: 1; overflow-y: auto; padding: 12px 14px; }
  .log { display: flex; flex-direction: column; gap: 6px; }
  .ev {
    font-size: 12.5px; color: var(--ink-2);
    border: 1px solid var(--hairline); border-radius: 6px;
    background: var(--page); padding: 6px 8px; overflow-wrap: anywhere;
  }
  .ev .evtext, .ev .content-text { white-space: pre-wrap; }
  .ev.agent, .ev.plan { background: var(--surface); color: var(--ink); }
  .ev.tool .evtext { font-family: ui-monospace, monospace; font-size: 12px; }
  .ev .tag {
    display: inline-block; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    border-radius: 4px; padding: 0 6px; margin-right: 6px; vertical-align: 1px;
    background: var(--hairline); color: var(--ink-2);
  }
  .ev .tag.attempt { background: var(--stale-bg);  color: var(--stale-ink); }
  .ev .tag.agent   { background: var(--open-bg);   color: var(--open-ink); }
  .ev .tag.plan    { background: var(--stale-bg);  color: var(--stale-ink); }
  .ev .tag.tool    { background: #ece9fb;          color: #4a3aa7; }
  .ev .tag.done    { background: var(--done-bg);   color: var(--done-ink); }
  .ev .tag.failed  { background: var(--failed-bg); color: var(--failed-ink); }
  .ev .tag.error   { background: var(--failed-bg); color: var(--failed-ink); }
  .ev details { margin-top: 4px; }
  .ev summary { cursor: pointer; color: var(--muted); font-size: 11px; }
  .ev summary:hover { color: var(--ink); }
  .ev .content { display: flex; flex-direction: column; gap: 7px; margin-top: 6px; }
  .ev pre {
    margin-top: 4px; max-height: 360px; overflow: auto;
    padding: 8px 10px; border-radius: 5px; background: #f1f1ed;
    border: 1px solid var(--hairline); white-space: pre;
    font: 11.5px/1.5 ui-monospace, "SFMono-Regular", Consolas, monospace;
  }
  .code-head {
    color: var(--muted); font: 10px/1.2 ui-monospace, monospace;
    text-transform: lowercase; margin-bottom: -4px;
  }
  .tok-comment { color: #77756e; font-style: italic; }
  .tok-string  { color: #7b3f00; }
  .tok-number  { color: #075985; }
  .tok-keyword { color: #6d28d9; font-weight: 600; }
  .tok-literal { color: #b42318; }
  .tok-property { color: #0969a8; }

  #close, #logclose {
    border: none; background: none; cursor: pointer;
    color: var(--muted); font-size: 18px; line-height: 1; padding: 2px 4px;
  }
  #close { float: right; }
  #close:hover, #logclose:hover { color: var(--ink); }
</style>
</head>
<body>

<header>
  <h1>orka <span>workbench</span></h1>
  <div id="workbench" title="Orka workbench"></div>
  <div id="stats"></div>
  <div id="legend">
    <span class="item"><span class="dot" style="background:var(--ready)"></span>machine-ready</span>
    <span class="item"><span class="dot" style="background:var(--awaiting)"></span>awaiting integration</span>
    <span class="item"><span class="dot" style="background:var(--blocked)"></span>blocked</span>
    <span class="item"><span class="dot" style="background:var(--complete)"></span>complete</span>
    <span class="item"><svg width="26" height="6"><line x1="0" y1="3" x2="26" y2="3" stroke="var(--edge)" stroke-width="1.5"/></svg>depends on</span>
    <span class="item"><svg width="26" height="6"><line x1="0" y1="3" x2="26" y2="3" stroke="var(--edge-derived)" stroke-width="1.5" stroke-dasharray="5 4"/></svg>derived from</span>
    <span id="refresh" title="auto-refresh"></span>
  </div>
</header>
<div id="problems"></div>

<main>
  <aside id="logview">
    <div class="loghead">
      <h2><span>work log — </span><em id="logtitle"></em></h2>
      <button id="logclose" title="close log">×</button>
    </div>
    <div class="logbody"></div>
  </aside>
  <div id="canvas">
    <svg id="svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="var(--edge)"></path>
        </marker>
        <marker id="arrow-hi" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="var(--ink-2)"></path>
        </marker>
      </defs>
      <g id="vp">
        <g id="edges"></g>
        <g id="nodes"></g>
      </g>
    </svg>
    <div id="empty">no work has been defined in this workbench</div>
  </div>
  <aside id="panel"></aside>
</main>

<script>
"use strict";

const NODE_W = 200, NODE_H = 72, GAP_X = 100, GAP_Y = 26;
const $ = id => document.getElementById(id);
const svgEl = (tag, attrs = {}) => {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
};

let data = { nodes: [], ready: [], attempts: [], candidates: [], reviews: [], problems: [] };
let byId = new Map();
let selected = null;
let fitted = false;
const tf = { x: 40, y: 40, k: 1 };

function statusLabel(n) {
  if (n.status === "awaiting_integration") {
    return n.integration === "accepted" ? "awaiting publication" : "awaiting acceptance";
  }
  return (n.status || "error").replaceAll("_", " ");
}

function statusPill(n) {
  return pill(n.status || "error", statusLabel(n));
}

// --- layout: layered left-to-right DAG ------------------------------------

// Every edge points dependency -> dependent (the direction work flows).
function edgesOf(nodes) {
  const ids = new Set(nodes.map(n => n.id));
  const out = [];
  for (const n of nodes) {
    for (const d of n.depends_on || []) if (ids.has(d)) out.push({ from: d, to: n.id, kind: "depends" });
    for (const d of n.derived_from || []) if (ids.has(d)) out.push({ from: d, to: n.id, kind: "derived" });
  }
  return out;
}

function layout(nodes, edges) {
  const preds = new Map(nodes.map(n => [n.id, []]));
  for (const e of edges) preds.get(e.to).push(e.from);

  // Longest path from the sources decides the column; cycles fall back to 0.
  const depth = new Map(), visiting = new Set();
  const depthOf = id => {
    if (depth.has(id)) return depth.get(id);
    if (visiting.has(id)) return 0;
    visiting.add(id);
    const d = Math.max(0, ...preds.get(id).map(p => depthOf(p) + 1));
    visiting.delete(id);
    depth.set(id, d);
    return d;
  };
  nodes.forEach(n => depthOf(n.id));

  const cols = [];
  for (const n of nodes) (cols[depth.get(n.id)] ??= []).push(n);

  // A few barycenter sweeps to reduce crossings.
  const pos = new Map();
  cols.forEach(col => col.forEach((n, i) => pos.set(n.id, i)));
  const succs = new Map(nodes.map(n => [n.id, []]));
  for (const e of edges) succs.get(e.from).push(e.to);
  for (let sweep = 0; sweep < 4; sweep++) {
    const refs = sweep % 2 === 0 ? preds : succs;
    for (const col of cols) {
      col.sort((a, b) => bary(a) - bary(b));
      col.forEach((n, i) => pos.set(n.id, i));
      function bary(n) {
        const r = refs.get(n.id);
        return r.length ? r.reduce((s, id) => s + pos.get(id), 0) / r.length : pos.get(n.id);
      }
    }
  }

  const xy = new Map();
  cols.forEach((col, c) => {
    const colH = col.length * (NODE_H + GAP_Y) - GAP_Y;
    col.forEach((n, i) => xy.set(n.id, {
      x: c * (NODE_W + GAP_X),
      y: i * (NODE_H + GAP_Y) - colH / 2,
    }));
  });
  return xy;
}

// --- rendering --------------------------------------------------------------

function render() {
  const nodes = data.nodes;
  byId = new Map(nodes.map(n => [n.id, n]));
  $("empty").style.display = nodes.length ? "none" : "flex";
  if (logFor && !(data.attempts || []).some(a => a.id === logFor)) closeLog();

  const edges = edgesOf(nodes);
  const xy = layout(nodes, edges);

  const eg = $("edges"), ng = $("nodes");
  eg.replaceChildren();
  ng.replaceChildren();

  for (const e of edges) {
    const a = xy.get(e.from), b = xy.get(e.to);
    const x1 = a.x + NODE_W, y1 = a.y + NODE_H / 2, x2 = b.x, y2 = b.y + NODE_H / 2;
    const mx = (x1 + x2) / 2;
    const path = svgEl("path", {
      d: `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2 - 4} ${y2}`,
      class: `edge ${e.kind === "derived" ? "derived" : ""}`,
      "marker-end": "url(#arrow)",
    });
    path.dataset.from = e.from;
    path.dataset.to = e.to;
    eg.appendChild(path);
  }

  for (const n of nodes) {
    const p = xy.get(n.id);
    const fo = svgEl("foreignObject", { x: p.x, y: p.y, width: NODE_W, height: NODE_H });
    const card = document.createElement("div");
    card.className = `card status-${n.status || "error"}`;
    card.dataset.id = n.id;

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = n.title || n.id;
    title.title = `${n.title}\n${n.id}`;
    card.appendChild(title);

    const tags = document.createElement("div");
    tags.className = "tags";
    tags.appendChild(statusPill(n));
    if ((n.stale || []).length) tags.appendChild(pill("stale", "⚠ stale"));
    if (n.orka_ready) tags.appendChild(pill("machine", "dispatchable"));
    else if (n.assignee === "human") tags.appendChild(pill("human", "👤 human"));
    const loggedAttempt = [...(n.attempts || [])].reverse().find(a => a.has_transcript);
    if (loggedAttempt) {
      const b = document.createElement("button");
      b.className = "pill logbtn";
      b.textContent = "log";
      b.title = "show work log";
      // Also select the node, so its result sits in the right panel while the
      // interaction log opens on the left.
      b.addEventListener("click", ev => {
        ev.stopPropagation(); select(n.id); openLog(loggedAttempt.id, n.title);
      });
      tags.appendChild(b);
    }
    card.appendChild(tags);

    card.addEventListener("click", ev => { ev.stopPropagation(); select(n.id); });
    card.addEventListener("pointerenter", () => highlight(n.id));
    card.addEventListener("pointerleave", () => highlight(selected));
    fo.appendChild(card);
    ng.appendChild(fo);
  }

  if (!fitted && nodes.length) { fit(xy); fitted = true; }
  applyTransform();
  highlight(selected);
  renderStats();
  renderProblems();
  renderPanel();
}

function pill(kind, label) {
  const s = document.createElement("span");
  s.className = `pill ${kind}`;
  const color = {
    ready: "ready",
    complete: "complete",
    awaiting_integration: "awaiting",
    blocked: "blocked",
    error: "blocked",
  }[kind];
  if (color) {
    const d = document.createElement("span");
    d.className = "dot";
    d.style.background = `var(--${color})`;
    s.appendChild(d);
  }
  s.appendChild(document.createTextNode(label));
  return s;
}

function renderStats() {
  const nodes = data.nodes;
  const count = s => nodes.filter(n => n.status === s).length;
  const pending = (data.candidates || []).filter(c => c.status === "pending").length;
  const running = (data.attempts || []).filter(a => a.phase !== "sealed").length;
  const chips = [
    [`<span class="dot" style="background:var(--ready)"></span><b>${(data.ready || []).length}</b> ready`],
    [`<b>${data.attempts.length}</b> attempts${running ? ` · ${running} active` : ""}`],
    [`<span class="dot" style="background:var(--awaiting)"></span><b>${pending}</b> candidates`],
    [`<b>${data.reviews.length}</b> reviews`],
    [`<b>${nodes.length}</b> graph nodes`],
  ];
  if (count("error")) {
    chips.push([`<span class="dot" style="background:var(--blocked)"></span><b>${count("error")}</b> errors`]);
  }
  $("stats").innerHTML = chips.map(c => `<span class="chip">${c}</span>`).join("");
}

function renderProblems() {
  const el = $("problems");
  const p = data.problems || [];
  el.style.display = p.length ? "block" : "none";
  el.textContent = p.length ? `workbench check: ${p.length} problem(s)\n` + p.join("\n") : "";
}

// Dim everything not connected to `id`; null clears the emphasis.
function highlight(id) {
  const related = new Set(id ? [id] : []);
  for (const path of $("edges").children) {
    const on = id && (path.dataset.from === id || path.dataset.to === id);
    path.classList.toggle("hi", !!on);
    path.classList.toggle("dim", !!id && !on);
    path.setAttribute("marker-end", on ? "url(#arrow-hi)" : "url(#arrow)");
    if (on) { related.add(path.dataset.from); related.add(path.dataset.to); }
  }
  for (const fo of $("nodes").children) {
    const card = fo.firstChild;
    card.classList.toggle("dim", !!id && !related.has(card.dataset.id));
    card.classList.toggle("sel", card.dataset.id === selected);
  }
}

// --- detail panel -----------------------------------------------------------

function select(id) {
  selected = id;
  history.replaceState(null, "", id ? `#${id}` : location.pathname);
  highlight(id);
  renderPanel();
}

// Drafts of in-progress responses, keyed by node id, so the periodic
// re-render doesn't eat what the human is typing.
const drafts = new Map();

function renderPanel() {
  const panel = $("panel");
  // Never rebuild the panel out from under a response being typed.
  if (panel.contains(document.activeElement) && document.activeElement.tagName === "TEXTAREA") return;
  const n = selected && byId.get(selected);
  panel.classList.toggle("show", !!n);
  if (!n) { panel.replaceChildren(); return; }

  panel.replaceChildren();
  const close = document.createElement("button");
  close.id = "close";
  close.textContent = "×";
  close.title = "close (esc)";
  close.addEventListener("click", () => select(null));
  panel.appendChild(close);

  const h2 = document.createElement("h2");
  h2.textContent = n.title;
  panel.appendChild(h2);
  const nid = document.createElement("div");
  nid.className = "nid";
  nid.textContent = n.id;
  panel.appendChild(nid);

  const tags = document.createElement("div");
  tags.className = "tags";
  tags.appendChild(statusPill(n));
  if (n.orka_ready) tags.appendChild(pill("machine", "ready for Orka"));
  if ((n.stale || []).length) tags.appendChild(pill("stale", "⚠ stale"));
  panel.appendChild(tags);

  const kv = document.createElement("dl");
  kv.className = "kv";
  const row = (k, v) => {
    const dt = document.createElement("dt"); dt.textContent = k;
    const dd = document.createElement("dd"); dd.textContent = v;
    kv.append(dt, dd);
  };
  row("author", n.author || "—");
  if (n.assignee) row("assignee", n.assignee);
  row("work state", statusLabel(n));
  row("recorded evidence", n.outcome || "open");
  if (n.currency) row("evidence currency", n.currency);
  panel.appendChild(section("about", kv));

  if (n.error) {
    const error = document.createElement("pre");
    error.textContent = n.error;
    panel.appendChild(section("evaluation error", error));
  }

  if ((n.description || "").trim()) {
    const div = document.createElement("div");
    div.className = "prose";
    div.textContent = n.description.trim();
    panel.appendChild(section("definition", div));
  }

  const linkList = ids => {
    const ul = document.createElement("ul");
    for (const id of ids) {
      const li = document.createElement("li");
      const b = document.createElement("button");
      b.className = "nodelink";
      b.textContent = id;
      const t = byId.get(id);
      if (t) {
        const small = document.createElement("small");
        small.textContent = `${t.title} — ${statusLabel(t)}`;
        b.appendChild(small);
      }
      b.addEventListener("click", () => select(id));
      li.appendChild(b);
      ul.appendChild(li);
    }
    return ul;
  };
  if ((n.depends_on || []).length) panel.appendChild(section("depends on", linkList(n.depends_on)));
  if ((n.derived_from || []).length) panel.appendChild(section("derived from", linkList(n.derived_from)));
  const dependents = data.nodes
    .filter(o => (o.depends_on || []).includes(n.id) || (o.derived_from || []).includes(n.id))
    .map(o => o.id);
  if (dependents.length) panel.appendChild(section("dependents", linkList(dependents)));

  const reasonList = items => {
    const ul = document.createElement("ul");
    for (const r of items) {
      const li = document.createElement("li");
      li.className = "reason";
      li.textContent = r;
      ul.appendChild(li);
    }
    return ul;
  };
  if ((n.blockers || []).length) panel.appendChild(section("blocked by", reasonList(n.blockers)));
  if ((n.stale || []).length) panel.appendChild(section("stale because", reasonList(n.stale)));

  if (n.candidate) {
    const c = n.candidate;
    const candidate = document.createElement("dl");
    candidate.className = "kv";
    const candidateRow = (k, v) => {
      const dt = document.createElement("dt"); dt.textContent = k;
      const dd = document.createElement("dd"); dd.textContent = v;
      candidate.append(dt, dd);
    };
    candidateRow("id", c.id);
    candidateRow("stage", (c.integration || "unknown").replaceAll("_", " "));
    candidateRow("target", c.target);
    candidateRow("branch", c.branch);
    panel.appendChild(section("candidate integration", candidate));
    const explanation = document.createElement("div");
    explanation.className = "prose";
    explanation.textContent = {
      pending: "The attempt succeeded, but its output is still a candidate. Accept or reject it before more work is dispatched.",
      accepted: "The output was accepted and will complete this node when it is published to the target branch.",
      published: "The output is present on the target branch and this node is complete.",
      rejected: "The candidate was rejected, so this node is ready for another attempt.",
    }[c.integration] || "The candidate's integration state could not be determined.";
    panel.appendChild(section("what this means", explanation));

    const activeReviews = (data.reviews || []).filter(r => r.candidate === c.id);
    if (activeReviews.length) {
      const reviewList = document.createElement("dl");
      reviewList.className = "kv";
      for (const review of activeReviews) {
        const dt = document.createElement("dt"); dt.textContent = "verification";
        const dd = document.createElement("dd");
        dd.textContent = `${review.verification} · ${review.branch}`;
        reviewList.append(dt, dd);
      }
      panel.appendChild(section("active review", reviewList));
    }
  }

  if ((n.attempts || []).length) {
    const list = document.createElement("div");
    list.className = "attempt-list";
    for (const attempt of [...n.attempts].reverse()) {
      const item = document.createElement("div");
      item.className = "attempt";
      const head = document.createElement("div"); head.className = "attempt-head";
      const code = document.createElement("code"); code.textContent = attempt.id;
      head.appendChild(code);
      if (attempt.has_transcript) {
        const log = document.createElement("button"); log.textContent = "transcript";
        log.addEventListener("click", () => openLog(attempt.id, n.title));
        head.appendChild(log);
      }
      const meta = document.createElement("div"); meta.className = "attempt-meta";
      const state = attempt.seal?.state || attempt.phase.replaceAll("_", " ");
      const backend = attempt.evidence?.backend ? ` · ${attempt.evidence.backend}` : "";
      const exit = attempt.evidence ? ` · exit ${attempt.evidence.exit_code}` : "";
      meta.textContent = `${state}${backend}${exit} · ${new Date(attempt.created_at_ms).toLocaleString()}`;
      item.append(head, meta); list.appendChild(item);
    }
    panel.appendChild(section("Orka attempts", list));
  }

  // Only actionable human work gets a response box. Awaiting and blocked
  // nodes have a different next action and must not look answerable.
  if (n.assignee === "human" && n.status === "ready") {
    const form = document.createElement("div");
    const ta = document.createElement("textarea");
    ta.placeholder = "type your response…";
    ta.value = drafts.get(n.id) || "";
    ta.addEventListener("input", () => drafts.set(n.id, ta.value));
    const btn = document.createElement("button");
    btn.className = "respond-send";
    btn.textContent = "respond & complete";
    const err = document.createElement("div");
    err.className = "respond-err";
    btn.addEventListener("click", () => submitResponse(n.id, ta, btn, err));
    form.append(ta, btn, err);
    panel.appendChild(section("respond", form));
  }

  if (n.result) {
    const r = n.result;
    const kv2 = document.createElement("dl");
    kv2.className = "kv";
    const row2 = (k, v) => {
      const dt = document.createElement("dt"); dt.textContent = k;
      const dd = document.createElement("dd"); dd.textContent = v;
      kv2.append(dt, dd);
    };
    row2("attempt outcome", r.outcome);
    row2("author", r.author);
    if (r.at) row2("when", new Date(r.at).toLocaleString());
    if (r.worked_by)
      row2("worked by", `${r.worked_by.backend}${r.worked_by.model ? ` (${r.worked_by.model})` : ""}`);
    if (r.output_commit) row2("output", r.output_commit.slice(0, 12));
    for (const ba of r.built_against || [])
      row2("built against", `${ba.id} @ ${ba.pin} (result ${ba.result || "none"}${ba.output ? `, output ${ba.output}` : ""})`);
    for (const c of r.context || []) row2("context", `${c.path} @ ${c.blob}`);
    panel.appendChild(section("result", kv2));
    if ((r.notes || "").trim()) {
      const pre = document.createElement("pre");
      pre.textContent = r.notes.trim();
      panel.appendChild(section("notes", pre));
    }
  }
}

async function submitResponse(id, ta, btn, err) {
  const notes = ta.value.trim();
  if (!notes) { err.textContent = "a response needs some text"; return; }
  btn.disabled = true;
  ta.disabled = true;
  err.textContent = "";
  try {
    const res = await fetch(`/api/respond/${encodeURIComponent(id)}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ notes }),
    });
    const payload = await res.json();
    if (!res.ok) throw new Error(payload.error || res.statusText);
    drafts.delete(id);
    ta.blur(); // release the typing guard so the refresh can rebuild the panel
    await load();
  } catch (e) {
    err.textContent = `failed: ${e.message}`;
    btn.disabled = false;
    ta.disabled = false;
  }
}

// --- work log view (left side) ------------------------------------------------

// Which Orka attempt transcript is open, so the view survives refreshes. The
// transcript is fetched on demand because it can be much larger than state.
let logFor = null;

async function openLog(attempt, title) {
  logFor = attempt;
  const body = document.querySelector("#logview .logbody");
  $("logtitle").textContent = `${title || attempt} · ${attempt}`;
  $("logview").classList.add("show");
  body.textContent = "loading…";
  try {
    const res = await fetch(`/api/transcript/${encodeURIComponent(attempt)}`);
    const payload = await res.json();
    if (!res.ok) throw new Error(payload.error || res.statusText);
    if (logFor !== attempt) return; // another log was opened while this one loaded
    body.replaceChildren(renderLog(payload.blocks));
  } catch (e) {
    if (logFor === attempt) body.textContent = `failed to load: ${e.message}`;
  }
}

function closeLog() {
  logFor = null;
  $("logview").classList.remove("show");
  document.querySelector("#logview .logbody").replaceChildren();
}

$("logclose").addEventListener("click", closeLog);

// Orka owns this provider-independent presentation format. The browser only
// decides how to lay out and colour the already-normalized work-log blocks.
function renderLog(blocks) {
  const wrap = document.createElement("div");
  wrap.className = "log";
  for (const block of Array.isArray(blocks) ? blocks : [])
    wrap.appendChild(workLogRow(block));
  if (!wrap.children.length) wrap.appendChild(evRow("raw", "log", "(empty)"));
  return wrap;
}

function workLogRow(block) {
  const b = block || {};
  switch (b.type) {
    case "session":
      return evRow("session", "session", b.id || "");
    case "turn_started":
      return evRow("attempt", "turn", "agent turn");
    case "command_started":
      return evRow("tool", "command", `▶ ${b.command || ""}`);
    case "command_completed": {
      const ok = b.exit_code === 0 || (b.exit_code == null && b.status === "completed");
      const state = [b.status, b.exit_code != null && `exit ${b.exit_code}`].filter(Boolean).join(", ");
      const details = b.output?.length ? detailsContent(b.output, "output") : null;
      return evRow(ok ? "done" : "failed", ok ? "done" : "failed",
                   `${b.command || ""}${state ? ` [${state}]` : ""}`, details);
    }
    case "files_changed": {
      const checkpoint = b.checkpoint ? ` · checkpoint ${b.checkpoint.slice(0, 12)}` : "";
      const details = b.files?.length ? fileChangeDetails(b.files) :
        b.checkpoint_error ? detailsContent([{type: "text", text: b.checkpoint_error}], "checkpoint error") : null;
      return evRow("tool", "changed", `${(b.paths || []).join(", ") || "files"}${checkpoint}`, details);
    }
    case "tool_started":
      return evRow("tool", "tool", [b.name, b.detail].filter(Boolean).join(" "));
    case "tool_completed":
      return evRow("done", "tool", `${b.name || "tool"} [${b.status || "completed"}]`);
    case "plan":
      return contentRow("plan", "plan", b.content);
    case "agent_message":
      return contentRow("agent", "agent", b.content);
    case "usage": {
      const u = b.usage || {};
      return evRow("session", "tokens",
        `${u.input_tokens || 0} input (${u.cached_input_tokens || 0} cached), ${u.output_tokens || 0} output`);
    }
    case "error":
      return evRow("error", "error", b.message || "agent error");
    case "transcript":
      return contentRow("raw", "output", b.content);
    default:
      return evRow("raw", "event", `unknown work-log block: ${b.type || "?"}`);
  }
}

function contentRow(cls, tag, content) {
  const row = evRow(cls, tag, "");
  row.appendChild(renderContent(content));
  return row;
}

function evRow(cls, tag, text, extra) {
  const d = document.createElement("div");
  d.className = `ev ${cls}`;
  const t = document.createElement("span");
  t.className = `tag ${cls}`;
  t.textContent = tag;
  d.appendChild(t);
  if (text) {
    const s = document.createElement("span");
    s.className = "evtext";
    s.textContent = text;
    d.appendChild(s);
  }
  if (extra) d.appendChild(extra);
  return d;
}

function renderContent(content) {
  const wrap = document.createElement("div");
  wrap.className = "content";
  for (const block of Array.isArray(content) ? content : []) {
    if (block.type === "code") {
      const language = normalizeLanguage(block.language);
      if (language || block.filename) {
        const head = document.createElement("div");
        head.className = "code-head";
        head.textContent = [block.filename, language].filter(Boolean).join(" · ");
        wrap.appendChild(head);
      }
      const pre = document.createElement("pre");
      pre.appendChild(highlightCode(block.text || "", language));
      wrap.appendChild(pre);
    } else if (block.type === "text") {
      const text = document.createElement("div");
      text.className = "content-text";
      text.textContent = block.text || "";
      wrap.appendChild(text);
    }
  }
  return wrap;
}

function fileChangeDetails(files) {
  const det = document.createElement("details");
  const sum = document.createElement("summary");
  sum.textContent = "files at checkpoint";
  const content = [];
  for (const file of files) {
    if (typeof file.text === "string") {
      content.push({
        type: "code", filename: file.path,
        language: languageFromPath(file.path), text: file.text,
      });
    } else {
      const state = file.deleted ? "deleted" : file.binary ? "binary file" : file.error || "unavailable";
      content.push({type: "text", text: `${file.path}: ${state}`});
    }
  }
  det.append(sum, renderContent(content));
  return det;
}

function detailsContent(content, label) {
  const det = document.createElement("details");
  const sum = document.createElement("summary");
  sum.textContent = label;
  det.append(sum, renderContent(content));
  return det;
}

const LANGUAGE_ALIASES = {
  rs: "rust", js: "javascript", jsx: "javascript", ts: "typescript",
  tsx: "typescript", py: "python", sh: "shell", bash: "shell",
  zsh: "shell", yml: "yaml", html: "html", xml: "html",
};
const KEYWORDS = {
  rust: "as async await break const continue crate dyn else enum extern false fn for if impl in let loop match mod move mut pub ref return self Self static struct super trait true type unsafe use where while".split(" "),
  javascript: "async await break case catch class const continue debugger default delete do else export extends finally for from function get if import in instanceof let new of return set static super switch throw try typeof var void while with yield".split(" "),
  typescript: "abstract any as asserts async await boolean break case catch class const constructor continue declare default delete do else enum export extends finally for from function get if implements import in infer instanceof interface is keyof let module namespace never new number object of private protected public readonly require return set static string super switch symbol this throw try type typeof undefined unique unknown var void while with yield".split(" "),
  python: "and as assert async await break class continue def del elif else except False finally for from global if import in is lambda None nonlocal not or pass raise return True try while with yield".split(" "),
  shell: "case do done elif else esac export fi for function if in local readonly select then time until while".split(" "),
};

function normalizeLanguage(language) {
  const name = String(language || "").toLowerCase().replace(/^language-/, "");
  return LANGUAGE_ALIASES[name] || name;
}

function languageFromPath(path) {
  const name = String(path || "").split("/").pop();
  const extension = name.includes(".") ? name.split(".").pop().toLowerCase() : "";
  const aliases = {
    rs: "rust", js: "javascript", jsx: "javascript", mjs: "javascript",
    ts: "typescript", tsx: "typescript", py: "python", sh: "shell",
    bash: "shell", zsh: "shell", json: "json", toml: "toml", yaml: "yaml",
    yml: "yaml", html: "html", htm: "html", css: "css", md: "markdown",
    c: "c", h: "c", cc: "cpp", cpp: "cpp", hpp: "cpp", java: "java",
  };
  return aliases[extension] || extension;
}

// A small, dependency-free lexer. It deliberately emits DOM text nodes rather
// than HTML, so agent output cannot become executable markup.
function highlightCode(source, language) {
  const code = document.createElement("code");
  if (language) code.className = `language-${language}`;
  const keywords = new Set(KEYWORDS[language] || []);
  const hashComments = ["python", "shell", "yaml", "toml"].includes(language);
  const slashComments = ["rust", "javascript", "typescript", "java", "c", "cpp", "css"].includes(language);
  let i = 0;
  const add = (text, cls) => {
    if (!text) return;
    if (!cls) return code.appendChild(document.createTextNode(text));
    const span = document.createElement("span");
    span.className = `tok-${cls}`;
    span.textContent = text;
    code.appendChild(span);
  };
  while (i < source.length) {
    const start = i;
    if (slashComments && source.startsWith("//", i)) {
      i = source.indexOf("\n", i);
      if (i < 0) i = source.length;
      add(source.slice(start, i), "comment");
    } else if (slashComments && source.startsWith("/*", i)) {
      const end = source.indexOf("*/", i + 2);
      i = end < 0 ? source.length : end + 2;
      add(source.slice(start, i), "comment");
    } else if (hashComments && source[i] === "#") {
      i = source.indexOf("\n", i);
      if (i < 0) i = source.length;
      add(source.slice(start, i), "comment");
    } else if (source[i] === '"' || source[i] === "'" || source[i] === "`") {
      const quote = source[i++];
      while (i < source.length) {
        if (source[i] === "\\") { i += Math.min(2, source.length - i); continue; }
        const ch = source[i++];
        if (ch === quote) break;
      }
      let kind = "string";
      if (language === "json" && /^\s*:/.test(source.slice(i))) kind = "property";
      add(source.slice(start, i), kind);
    } else if (/\d/.test(source[i])) {
      i++;
      while (i < source.length && /[\w.+-]/.test(source[i])) i++;
      add(source.slice(start, i), "number");
    } else if (/[A-Za-z_$]/.test(source[i])) {
      i++;
      while (i < source.length && /[\w$]/.test(source[i])) i++;
      const word = source.slice(start, i);
      const literal = ["true", "false", "null", "None", "True", "False"].includes(word);
      add(word, literal ? "literal" : keywords.has(word) ? "keyword" : "");
    } else {
      i++;
      add(source.slice(start, i), "");
    }
  }
  return code;
}

function section(title, content) {
  const s = document.createElement("section");
  const h = document.createElement("h3");
  h.textContent = title;
  s.append(h, content);
  return s;
}

// --- pan & zoom ---------------------------------------------------------------

function applyTransform() {
  $("vp").setAttribute("transform", `translate(${tf.x} ${tf.y}) scale(${tf.k})`);
}

function fit(xy) {
  const svg = $("svg").getBoundingClientRect();
  let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  for (const p of xy.values()) {
    x0 = Math.min(x0, p.x); y0 = Math.min(y0, p.y);
    x1 = Math.max(x1, p.x + NODE_W); y1 = Math.max(y1, p.y + NODE_H);
  }
  const pad = 48;
  tf.k = Math.min(1, (svg.width - pad * 2) / (x1 - x0), (svg.height - pad * 2) / (y1 - y0));
  tf.x = (svg.width - (x1 - x0) * tf.k) / 2 - x0 * tf.k;
  tf.y = (svg.height - (y1 - y0) * tf.k) / 2 - y0 * tf.k;
}

{
  const svg = $("svg");
  let pan = null;
  svg.addEventListener("pointerdown", ev => {
    // A press on a card is a click-in-waiting, not a pan: capturing the
    // pointer here would retarget the click to the svg and eat the selection.
    if (ev.target instanceof Element && ev.target.closest(".card")) return;
    pan = { x: ev.clientX, y: ev.clientY, tx: tf.x, ty: tf.y, moved: false };
    svg.classList.add("panning");
    svg.setPointerCapture(ev.pointerId);
  });
  svg.addEventListener("pointermove", ev => {
    if (!pan) return;
    const dx = ev.clientX - pan.x, dy = ev.clientY - pan.y;
    if (Math.abs(dx) + Math.abs(dy) > 3) pan.moved = true;
    tf.x = pan.tx + dx;
    tf.y = pan.ty + dy;
    applyTransform();
  });
  svg.addEventListener("pointerup", ev => {
    svg.classList.remove("panning");
    if (pan && !pan.moved && ev.target === svg) select(null);
    pan = null;
  });
  svg.addEventListener("wheel", ev => {
    ev.preventDefault();
    const k = Math.min(3, Math.max(0.1, tf.k * Math.exp(-ev.deltaY * 0.0015)));
    const r = svg.getBoundingClientRect();
    const mx = ev.clientX - r.left, my = ev.clientY - r.top;
    tf.x = mx - ((mx - tf.x) / tf.k) * k;
    tf.y = my - ((my - tf.y) / tf.k) * k;
    tf.k = k;
    applyTransform();
  }, { passive: false });
  document.addEventListener("keydown", ev => { if (ev.key === "Escape") select(null); });
}

// --- data loop ----------------------------------------------------------------

async function load() {
  try {
    const res = await fetch("/api/state");
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || res.statusText);
    data = body;
    $("workbench").textContent = body.workbench || "";
    $("workbench").title = body.workbench || "Orka workbench";
    if (selected && !body.nodes.some(n => n.id === selected)) selected = null;
    render();
    $("refresh").className = "live";
  } catch (e) {
    $("refresh").className = "err";
    $("refresh").title = `refresh failed: ${e.message}`;
  }
}

selected = location.hash.slice(1) || null;
load();
setInterval(load, 4000);
</script>
</body>
</html>
