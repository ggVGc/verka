<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>llaundry graph</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <header>
      <h1>llaundry</h1>
      <button id="refresh" title="Reload graph">↻</button>
    </header>

    <section class="filters">
      <label><input type="checkbox" class="typefilter" value="description" checked> description</label>
      <label><input type="checkbox" class="typefilter" value="task" checked> task</label>
      <label><input type="checkbox" class="typefilter" value="implementation" checked> implementation</label>
      <label><input type="checkbox" class="typefilter" value="verification" checked> verification</label>
      <label><input type="checkbox" class="typefilter" value="build" checked> build</label>
      <label><input type="checkbox" class="typefilter" value="artifact" checked> artifact</label>
    </section>

    <section class="filters edgekinds">
      <label><input type="checkbox" class="edgefilter" value="child" checked> child</label>
      <label><input type="checkbox" class="edgefilter" value="depends_on" checked> depends_on</label>
      <label><input type="checkbox" class="edgefilter" value="verifies" checked> verifies</label>
      <label><input type="checkbox" class="edgefilter" value="builds" checked> builds</label>
      <label><input type="checkbox" class="edgefilter" value="consumes_artifact" checked> consumes_artifact</label>
      <label><input type="checkbox" class="edgefilter" value="supersedes" checked> supersedes</label>
    </section>

    <section class="search">
      <input id="search" type="search" placeholder="search by id / content…">
    </section>

    <section class="legend">
      <h3>status</h3>
      <div class="chip s-draft">draft</div>
      <div class="chip s-ready">ready</div>
      <div class="chip s-running">running</div>
      <div class="chip s-passed">passed</div>
      <div class="chip s-failed">failed</div>
      <div class="chip stale">stale</div>
    </section>

  </aside>

  <main id="graph"></main>

  <aside id="details">
    <p class="hint">click a node to inspect</p>
  </aside>
</div>
<script src="/app.js"></script>
</body>
</html>
