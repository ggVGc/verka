<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>linka — node graph</title>
<style>
  :root {
    --page:        #f9f9f7;
    --surface:     #fcfcfb;
    --ink:         #0b0b0b;
    --ink-2:       #52514e;
    --muted:       #898781;
    --hairline:    #e1e0d9;
    --border:      rgba(11, 11, 11, 0.10);

    --open:        #2a78d6;  --open-bg:   #e3edfb;  --open-ink:   #1c5cab;
    --done:        #0ca30c;  --done-bg:   #e2f4e2;  --done-ink:   #006300;
    --failed:      #d03b3b;  --failed-bg: #fbe4e4;  --failed-ink: #a32c2c;
    --stale-bg:    #fdf1d7;  --stale-ink: #8a5a00;
    --edge:        #b9b7ae;
    --edge-derived:#c9c7be;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--ink);
    background: var(--page);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--hairline);
  }
  header h1 { font-size: 15px; font-weight: 600; }
  header h1 span { color: var(--muted); font-weight: 400; }
  #stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 10px; border-radius: 999px;
    background: var(--page); border: 1px solid var(--hairline);
    color: var(--ink-2); font-size: 12.5px; white-space: nowrap;
  }
  .chip b { color: var(--ink); font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  #legend { margin-left: auto; display: flex; gap: 14px; align-items: center;
            color: var(--muted); font-size: 12px; flex-wrap: wrap; }
  #legend .item { display: inline-flex; align-items: center; gap: 5px; }
  #legend svg { display: block; }
  #refresh { width: 7px; height: 7px; border-radius: 50%; background: var(--hairline);
             transition: background .3s; flex: none; }
  #refresh.live { background: var(--done); }
  #refresh.err  { background: var(--failed); }

  #problems {
    display: none;
    padding: 8px 16px;
    background: var(--stale-bg); color: var(--stale-ink);
    border-bottom: 1px solid var(--hairline);
    font-size: 13px; white-space: pre-wrap;
  }

  main { flex: 1; display: flex; min-height: 0; }
  #canvas { flex: 1; position: relative; min-width: 0; }
  #svg { width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
  #svg.panning { cursor: grabbing; }
  #empty {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    color: var(--muted); pointer-events: none;
  }

  .edge { fill: none; stroke: var(--edge); stroke-width: 1.5; }
  .edge.derived { stroke: var(--edge-derived); stroke-dasharray: 5 4; }
  .edge.hi { stroke: var(--ink-2); stroke-width: 2; }
  .edge.dim { opacity: 0.25; }

  .card {
    width: 100%; height: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--muted);
    border-radius: 8px;
    padding: 8px 10px 7px;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(11,11,11,0.04);
    overflow: hidden;
    display: flex; flex-direction: column; gap: 4px;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(11,11,11,0.10); }
  .card.sel { outline: 2px solid var(--open); outline-offset: 1px; }
  .card.dim { opacity: 0.35; }
  .card.status-open   { border-left-color: var(--open); }
  .card.status-done   { border-left-color: var(--done); }
  .card.status-failed { border-left-color: var(--failed); }
  .card .title {
    font-weight: 600; font-size: 12.5px; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .tags { display: flex; gap: 4px; flex-wrap: nowrap; overflow: hidden; margin-top: auto; flex: none; }
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10.5px; font-weight: 600;
    padding: 1px 7px; border-radius: 999px; white-space: nowrap;
  }
  .pill .dot { width: 6px; height: 6px; }
  .pill.open   { background: var(--open-bg);   color: var(--open-ink); }
  .pill.done   { background: var(--done-bg);   color: var(--done-ink); }
  .pill.failed { background: var(--failed-bg); color: var(--failed-ink); }
  .pill.stale  { background: var(--stale-bg);  color: var(--stale-ink); }
  .pill.ready  { background: var(--page); color: var(--ink-2); border: 1px solid var(--hairline); }
  .pill.human  { background: var(--page); color: var(--ink-2); border: 1px solid var(--hairline); }
  button.pill.logbtn {
    margin-left: auto; cursor: pointer;
    font: inherit; font-size: 10.5px; font-weight: 600;
    background: var(--page); color: var(--open-ink);
    border: 1px solid var(--hairline);
  }
  button.pill.logbtn:hover { border-color: var(--open); background: var(--open-bg); }

  #panel {
    width: 360px; flex: none;
    background: var(--surface);
    border-left: 1px solid var(--hairline);
    overflow-y: auto;
    padding: 16px;
    display: none;
  }
  #panel.show { display: block; }
  #panel h2 { font-size: 15px; line-height: 1.35; margin-bottom: 2px; overflow-wrap: anywhere; }
  #panel .nid { color: var(--muted); font-size: 11.5px; font-family: ui-monospace, monospace;
                overflow-wrap: anywhere; }
  #panel .tags { display: flex; gap: 5px; flex-wrap: wrap; margin: 10px 0 4px; }
  #panel .pill { font-size: 11.5px; padding: 2px 9px; }
  #panel section { margin-top: 14px; }
  #panel section > h3 {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted); margin-bottom: 5px;
  }
  #panel .kv { display: grid; grid-template-columns: max-content 1fr; gap: 2px 10px;
               font-size: 13px; color: var(--ink-2); }
  #panel .kv dt { color: var(--muted); }
  #panel .kv dd { overflow-wrap: anywhere; }
  #panel pre {
    font: 12px/1.5 ui-monospace, monospace;
    background: var(--page); border: 1px solid var(--hairline); border-radius: 6px;
    padding: 8px 10px; white-space: pre-wrap; overflow-wrap: anywhere;
  }
  #panel .prose { white-space: pre-wrap; font-size: 13px; color: var(--ink-2);
                  overflow-wrap: anywhere; }
  #panel ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  #panel .reason { font-size: 12.5px; color: var(--stale-ink); background: var(--stale-bg);
                   border-radius: 6px; padding: 4px 8px; overflow-wrap: anywhere; }
  #panel textarea {
    width: 100%; min-height: 90px; resize: vertical;
    font: 13px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--ink); background: var(--page);
    border: 1px solid var(--hairline); border-radius: 6px;
    padding: 8px 10px;
  }
  #panel textarea:focus { outline: none; border-color: var(--open); }
  #panel .respond-send {
    margin-top: 8px; cursor: pointer;
    font: inherit; font-size: 12.5px; font-weight: 600;
    padding: 5px 14px; border-radius: 6px;
    background: var(--open-bg); color: var(--open-ink);
    border: 1px solid var(--open);
  }
  #panel .respond-send:hover { background: var(--open); color: #fff; }
  #panel .respond-send:disabled { opacity: 0.5; cursor: default; }
  #panel .respond-err { margin-top: 6px; font-size: 12.5px; color: var(--failed-ink); }
  .nodelink {
    font: 12.5px/1.4 ui-monospace, monospace;
    display: block; width: 100%; text-align: left;
    background: var(--page); border: 1px solid var(--hairline); border-radius: 6px;
    padding: 4px 8px; color: var(--open-ink); cursor: pointer;
    overflow-wrap: anywhere;
  }
  .nodelink:hover { border-color: var(--open); }
  .nodelink small { color: var(--muted); font-family: system-ui, sans-serif; display: block; }
  /* work log view (left side) */
  #logview {
    width: 400px; flex: none;
    background: var(--surface);
    border-right: 1px solid var(--hairline);
    display: none; flex-direction: column; min-width: 0;
  }
  #logview.show { display: flex; }
  #logview .loghead {
    display: flex; align-items: baseline; gap: 8px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--hairline);
  }
  #logview .loghead h2 {
    font-size: 13px; font-weight: 600; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #logview .loghead h2 span { color: var(--muted); font-weight: 400; }
  #logview .loghead h2 em { font-style: normal; }
  #logview .logbody { flex: 1; overflow-y: auto; padding: 12px 14px; }
  .log { display: flex; flex-direction: column; gap: 6px; }
  .ev {
    font-size: 12.5px; color: var(--ink-2);
    border: 1px solid var(--hairline); border-radius: 6px;
    background: var(--page); padding: 6px 8px; overflow-wrap: anywhere;
  }
  .ev .evtext { white-space: pre-wrap; }
  .ev.claude { background: var(--surface); color: var(--ink); }
  .ev.tool .evtext { font-family: ui-monospace, monospace; font-size: 12px; }
  .ev .tag {
    display: inline-block; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    border-radius: 4px; padding: 0 6px; margin-right: 6px; vertical-align: 1px;
    background: var(--hairline); color: var(--ink-2);
  }
  .ev .tag.attempt { background: var(--stale-bg);  color: var(--stale-ink); }
  .ev .tag.claude  { background: var(--open-bg);   color: var(--open-ink); }
  .ev .tag.tool    { background: #ece9fb;          color: #4a3aa7; }
  .ev .tag.done    { background: var(--done-bg);   color: var(--done-ink); }
  .ev .tag.failed  { background: var(--failed-bg); color: var(--failed-ink); }
  .ev .tag.thinking { color: var(--muted); }
  .ev details { margin-top: 4px; }
  .ev summary { cursor: pointer; color: var(--muted); font-size: 11px; }
  .ev summary:hover { color: var(--ink); }
  .ev pre { margin-top: 4px; max-height: 260px; overflow: auto; }

  #close, #logclose {
    border: none; background: none; cursor: pointer;
    color: var(--muted); font-size: 18px; line-height: 1; padding: 2px 4px;
  }
  #close { float: right; }
  #close:hover, #logclose:hover { color: var(--ink); }
</style>
</head>
<body>

<header>
  <h1>linka <span>node graph</span></h1>
  <div id="stats"></div>
  <div id="legend">
    <span class="item"><span class="dot" style="background:var(--open)"></span>open</span>
    <span class="item"><span class="dot" style="background:var(--done)"></span>done</span>
    <span class="item"><span class="dot" style="background:var(--failed)"></span>failed</span>
    <span class="item"><svg width="26" height="6"><line x1="0" y1="3" x2="26" y2="3" stroke="var(--edge)" stroke-width="1.5"/></svg>depends on</span>
    <span class="item"><svg width="26" height="6"><line x1="0" y1="3" x2="26" y2="3" stroke="var(--edge-derived)" stroke-width="1.5" stroke-dasharray="5 4"/></svg>derived from</span>
    <span id="refresh" title="auto-refresh"></span>
  </div>
</header>
<div id="problems"></div>

<main>
  <aside id="logview">
    <div class="loghead">
      <h2><span>work log — </span><em id="logtitle"></em></h2>
      <button id="logclose" title="close log">×</button>
    </div>
    <div class="logbody"></div>
  </aside>
  <div id="canvas">
    <svg id="svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="var(--edge)"></path>
        </marker>
        <marker id="arrow-hi" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="var(--ink-2)"></path>
        </marker>
      </defs>
      <g id="vp">
        <g id="edges"></g>
        <g id="nodes"></g>
      </g>
    </svg>
    <div id="empty">no nodes yet — <span style="font-family:ui-monospace,monospace">&nbsp;linka add&nbsp;</span> to create one</div>
  </div>
  <aside id="panel"></aside>
</main>

<script>
"use strict";

const NODE_W = 200, NODE_H = 72, GAP_X = 100, GAP_Y = 26;
const $ = id => document.getElementById(id);
const svgEl = (tag, attrs = {}) => {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
};

let data = { nodes: [], problems: [] };
let byId = new Map();
let selected = null;
let fitted = false;
const tf = { x: 40, y: 40, k: 1 };

// --- layout: layered left-to-right DAG ------------------------------------

// Every edge points dependency -> dependent (the direction work flows).
function edgesOf(nodes) {
  const ids = new Set(nodes.map(n => n.id));
  const out = [];
  for (const n of nodes) {
    for (const d of n.depends_on || []) if (ids.has(d)) out.push({ from: d, to: n.id, kind: "depends" });
    for (const d of n.derived_from || []) if (ids.has(d)) out.push({ from: d, to: n.id, kind: "derived" });
  }
  return out;
}

function layout(nodes, edges) {
  const preds = new Map(nodes.map(n => [n.id, []]));
  for (const e of edges) preds.get(e.to).push(e.from);

  // Longest path from the sources decides the column; cycles fall back to 0.
  const depth = new Map(), visiting = new Set();
  const depthOf = id => {
    if (depth.has(id)) return depth.get(id);
    if (visiting.has(id)) return 0;
    visiting.add(id);
    const d = Math.max(0, ...preds.get(id).map(p => depthOf(p) + 1));
    visiting.delete(id);
    depth.set(id, d);
    return d;
  };
  nodes.forEach(n => depthOf(n.id));

  const cols = [];
  for (const n of nodes) (cols[depth.get(n.id)] ??= []).push(n);

  // A few barycenter sweeps to reduce crossings.
  const pos = new Map();
  cols.forEach(col => col.forEach((n, i) => pos.set(n.id, i)));
  const succs = new Map(nodes.map(n => [n.id, []]));
  for (const e of edges) succs.get(e.from).push(e.to);
  for (let sweep = 0; sweep < 4; sweep++) {
    const refs = sweep % 2 === 0 ? preds : succs;
    for (const col of cols) {
      col.sort((a, b) => bary(a) - bary(b));
      col.forEach((n, i) => pos.set(n.id, i));
      function bary(n) {
        const r = refs.get(n.id);
        return r.length ? r.reduce((s, id) => s + pos.get(id), 0) / r.length : pos.get(n.id);
      }
    }
  }

  const xy = new Map();
  cols.forEach((col, c) => {
    const colH = col.length * (NODE_H + GAP_Y) - GAP_Y;
    col.forEach((n, i) => xy.set(n.id, {
      x: c * (NODE_W + GAP_X),
      y: i * (NODE_H + GAP_Y) - colH / 2,
    }));
  });
  return xy;
}

// --- rendering --------------------------------------------------------------

function render() {
  const nodes = data.nodes;
  byId = new Map(nodes.map(n => [n.id, n]));
  $("empty").style.display = nodes.length ? "none" : "flex";
  if (logFor && !byId.has(logFor)) closeLog();

  const edges = edgesOf(nodes);
  const xy = layout(nodes, edges);

  const eg = $("edges"), ng = $("nodes");
  eg.replaceChildren();
  ng.replaceChildren();

  for (const e of edges) {
    const a = xy.get(e.from), b = xy.get(e.to);
    const x1 = a.x + NODE_W, y1 = a.y + NODE_H / 2, x2 = b.x, y2 = b.y + NODE_H / 2;
    const mx = (x1 + x2) / 2;
    const path = svgEl("path", {
      d: `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2 - 4} ${y2}`,
      class: `edge ${e.kind === "derived" ? "derived" : ""}`,
      "marker-end": "url(#arrow)",
    });
    path.dataset.from = e.from;
    path.dataset.to = e.to;
    eg.appendChild(path);
  }

  for (const n of nodes) {
    const p = xy.get(n.id);
    const fo = svgEl("foreignObject", { x: p.x, y: p.y, width: NODE_W, height: NODE_H });
    const card = document.createElement("div");
    card.className = `card status-${n.status || "open"}`;
    card.dataset.id = n.id;

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = n.title || n.id;
    title.title = `${n.title}\n${n.id}`;
    card.appendChild(title);

    const tags = document.createElement("div");
    tags.className = "tags";
    tags.appendChild(pill(n.status, n.status));
    if ((n.stale || []).length) tags.appendChild(pill("stale", "⚠ stale"));
    if (n.ready && n.status !== "done") tags.appendChild(pill("ready", "ready"));
    if (n.assignee === "human") tags.appendChild(pill("human", "👤 human"));
    if (n.has_log) {
      const b = document.createElement("button");
      b.className = "pill logbtn";
      b.textContent = "log";
      b.title = "show work log";
      // Also select the node, so its result sits in the right panel while the
      // interaction log opens on the left.
      b.addEventListener("click", ev => { ev.stopPropagation(); select(n.id); openLog(n.id); });
      tags.appendChild(b);
    }
    card.appendChild(tags);

    card.addEventListener("click", ev => { ev.stopPropagation(); select(n.id); });
    card.addEventListener("pointerenter", () => highlight(n.id));
    card.addEventListener("pointerleave", () => highlight(selected));
    fo.appendChild(card);
    ng.appendChild(fo);
  }

  if (!fitted && nodes.length) { fit(xy); fitted = true; }
  applyTransform();
  highlight(selected);
  renderStats();
  renderProblems();
  renderPanel();
}

function pill(kind, label) {
  const s = document.createElement("span");
  s.className = `pill ${kind}`;
  if (kind === "open" || kind === "done" || kind === "failed") {
    const d = document.createElement("span");
    d.className = "dot";
    d.style.background = `var(--${kind})`;
    s.appendChild(d);
  }
  s.appendChild(document.createTextNode(label));
  return s;
}

function renderStats() {
  const nodes = data.nodes;
  const count = s => nodes.filter(n => n.status === s).length;
  const stale = nodes.filter(n => (n.stale || []).length).length;
  const ready = nodes.filter(n => n.ready && n.status !== "done").length;
  const chips = [
    [`<b>${nodes.length}</b> nodes`],
    [`<span class="dot" style="background:var(--open)"></span><b>${count("open")}</b> open`],
    [`<span class="dot" style="background:var(--done)"></span><b>${count("done")}</b> done`],
    [`<span class="dot" style="background:var(--failed)"></span><b>${count("failed")}</b> failed`],
    [`<b>${stale}</b> stale`],
    [`<b>${ready}</b> ready`],
  ];
  $("stats").innerHTML = chips.map(c => `<span class="chip">${c}</span>`).join("");
}

function renderProblems() {
  const el = $("problems");
  const p = data.problems || [];
  el.style.display = p.length ? "block" : "none";
  el.textContent = p.length ? `store check: ${p.length} problem(s)\n` + p.join("\n") : "";
}

// Dim everything not connected to `id`; null clears the emphasis.
function highlight(id) {
  const related = new Set(id ? [id] : []);
  for (const path of $("edges").children) {
    const on = id && (path.dataset.from === id || path.dataset.to === id);
    path.classList.toggle("hi", !!on);
    path.classList.toggle("dim", !!id && !on);
    path.setAttribute("marker-end", on ? "url(#arrow-hi)" : "url(#arrow)");
    if (on) { related.add(path.dataset.from); related.add(path.dataset.to); }
  }
  for (const fo of $("nodes").children) {
    const card = fo.firstChild;
    card.classList.toggle("dim", !!id && !related.has(card.dataset.id));
    card.classList.toggle("sel", card.dataset.id === selected);
  }
}

// --- detail panel -----------------------------------------------------------

function select(id) {
  selected = id;
  history.replaceState(null, "", id ? `#${id}` : location.pathname);
  highlight(id);
  renderPanel();
}

// Drafts of in-progress responses, keyed by node id, so the periodic
// re-render doesn't eat what the human is typing.
const drafts = new Map();

function renderPanel() {
  const panel = $("panel");
  // Never rebuild the panel out from under a response being typed.
  if (panel.contains(document.activeElement) && document.activeElement.tagName === "TEXTAREA") return;
  const n = selected && byId.get(selected);
  panel.classList.toggle("show", !!n);
  if (!n) { panel.replaceChildren(); return; }

  panel.replaceChildren();
  const close = document.createElement("button");
  close.id = "close";
  close.textContent = "×";
  close.title = "close (esc)";
  close.addEventListener("click", () => select(null));
  panel.appendChild(close);

  const h2 = document.createElement("h2");
  h2.textContent = n.title;
  panel.appendChild(h2);
  const nid = document.createElement("div");
  nid.className = "nid";
  nid.textContent = n.id;
  panel.appendChild(nid);

  const tags = document.createElement("div");
  tags.className = "tags";
  tags.appendChild(pill(n.status, n.status));
  if ((n.stale || []).length) tags.appendChild(pill("stale", "⚠ stale"));
  if (n.ready && n.status !== "done") tags.appendChild(pill("ready", "ready"));
  panel.appendChild(tags);

  const kv = document.createElement("dl");
  kv.className = "kv";
  const row = (k, v) => {
    const dt = document.createElement("dt"); dt.textContent = k;
    const dd = document.createElement("dd"); dd.textContent = v;
    kv.append(dt, dd);
  };
  row("author", n.author || "—");
  if (n.assignee) row("assignee", n.assignee);
  panel.appendChild(section("about", kv));

  if ((n.description || "").trim()) {
    const div = document.createElement("div");
    div.className = "prose";
    div.textContent = n.description.trim();
    panel.appendChild(section("definition", div));
  }

  const linkList = ids => {
    const ul = document.createElement("ul");
    for (const id of ids) {
      const li = document.createElement("li");
      const b = document.createElement("button");
      b.className = "nodelink";
      b.textContent = id;
      const t = byId.get(id);
      if (t) {
        const small = document.createElement("small");
        small.textContent = `${t.title} — ${t.status}`;
        b.appendChild(small);
      }
      b.addEventListener("click", () => select(id));
      li.appendChild(b);
      ul.appendChild(li);
    }
    return ul;
  };
  if ((n.depends_on || []).length) panel.appendChild(section("depends on", linkList(n.depends_on)));
  if ((n.derived_from || []).length) panel.appendChild(section("derived from", linkList(n.derived_from)));
  const dependents = data.nodes
    .filter(o => (o.depends_on || []).includes(n.id) || (o.derived_from || []).includes(n.id))
    .map(o => o.id);
  if (dependents.length) panel.appendChild(section("dependents", linkList(dependents)));

  const reasonList = items => {
    const ul = document.createElement("ul");
    for (const r of items) {
      const li = document.createElement("li");
      li.className = "reason";
      li.textContent = r;
      ul.appendChild(li);
    }
    return ul;
  };
  if ((n.blockers || []).length) panel.appendChild(section("blocked by", reasonList(n.blockers)));
  if ((n.stale || []).length) panel.appendChild(section("stale because", reasonList(n.stale)));

  // A node assigned to a human that is not done takes a typed response;
  // submitting completes the node with the response as its result notes.
  if (n.assignee === "human" && n.status !== "done") {
    const form = document.createElement("div");
    const ta = document.createElement("textarea");
    ta.placeholder = "type your response…";
    ta.value = drafts.get(n.id) || "";
    ta.addEventListener("input", () => drafts.set(n.id, ta.value));
    const btn = document.createElement("button");
    btn.className = "respond-send";
    btn.textContent = "respond & complete";
    const err = document.createElement("div");
    err.className = "respond-err";
    btn.addEventListener("click", () => submitResponse(n.id, ta, btn, err));
    form.append(ta, btn, err);
    panel.appendChild(section("respond", form));
  }

  if (n.result) {
    const r = n.result;
    const kv2 = document.createElement("dl");
    kv2.className = "kv";
    const row2 = (k, v) => {
      const dt = document.createElement("dt"); dt.textContent = k;
      const dd = document.createElement("dd"); dd.textContent = v;
      kv2.append(dt, dd);
    };
    row2("outcome", r.outcome);
    row2("author", r.author);
    if (r.at) row2("when", new Date(r.at).toLocaleString());
    if (r.worked_by)
      row2("worked by", `${r.worked_by.backend}${r.worked_by.model ? ` (${r.worked_by.model})` : ""}`);
    if (r.output_commit) row2("output", r.output_commit.slice(0, 12));
    for (const ba of r.built_against || [])
      row2("built against", `${ba.id} @ ${ba.pin} (result ${ba.result || "none"}${ba.output ? `, output ${ba.output}` : ""})`);
    for (const c of r.context || []) row2("context", `${c.path} @ ${c.blob}`);
    panel.appendChild(section("result", kv2));
    if ((r.notes || "").trim()) {
      const pre = document.createElement("pre");
      pre.textContent = r.notes.trim();
      panel.appendChild(section("notes", pre));
    }
  }
}

async function submitResponse(id, ta, btn, err) {
  const notes = ta.value.trim();
  if (!notes) { err.textContent = "a response needs some text"; return; }
  btn.disabled = true;
  ta.disabled = true;
  err.textContent = "";
  try {
    const res = await fetch(`/api/respond/${encodeURIComponent(id)}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ notes }),
    });
    const payload = await res.json();
    if (!res.ok) throw new Error(payload.error || res.statusText);
    drafts.delete(id);
    ta.blur(); // release the typing guard so the refresh can rebuild the panel
    await load();
  } catch (e) {
    err.textContent = `failed: ${e.message}`;
    btn.disabled = false;
    ta.disabled = false;
  }
}

// --- work log view (left side) ------------------------------------------------

// Which node's log is open, so the view survives the refresh cycle. The log is
// fetched on open — it can be big, and the graph poll shouldn't carry it.
let logFor = null;

async function openLog(id) {
  logFor = id;
  const body = document.querySelector("#logview .logbody");
  $("logtitle").textContent = byId.get(id)?.title || id;
  $("logview").classList.add("show");
  body.textContent = "loading…";
  try {
    const res = await fetch(`/api/log/${encodeURIComponent(id)}`);
    const payload = await res.json();
    if (!res.ok) throw new Error(payload.error || res.statusText);
    if (logFor !== id) return; // another log was opened while this one loaded
    body.replaceChildren(renderLog(payload.log));
  } catch (e) {
    if (logFor === id) body.textContent = `failed to load: ${e.message}`;
  }
}

function closeLog() {
  logFor = null;
  $("logview").classList.remove("show");
  document.querySelector("#logview .logbody").replaceChildren();
}

$("logclose").addEventListener("click", closeLog);

// One JSONL line per event: our own `attempt` header plus the backend's
// stream-json events (system, assistant, user/tool_result, result).
function renderLog(text) {
  const wrap = document.createElement("div");
  wrap.className = "log";
  // Consecutive thinking blocks — within one message or across adjacent events —
  // are one train of thought: buffer them and emit a single combined row.
  let thinking = [];
  const flushThinking = () => {
    if (!thinking.length) return;
    const t = thinking.join("\n\n");
    wrap.appendChild(evRow("thinking", "thinking", trunc(t, 300),
                           t.length > 300 ? detailsText(t, "full thinking") : null));
    thinking = [];
  };
  for (const line of text.split("\n")) {
    if (!line.trim()) continue;
    let ev = null;
    try { ev = JSON.parse(line); } catch { /* rendered raw below */ }
    for (const item of eventRows(ev, line)) {
      if (item.thinking !== undefined) {
        thinking.push(item.thinking);
      } else {
        flushThinking();
        wrap.appendChild(item);
      }
    }
  }
  flushThinking();
  if (!wrap.children.length) wrap.appendChild(evRow("raw", "log", "(empty)"));
  return wrap;
}

function eventRows(ev, raw) {
  if (!ev || typeof ev !== "object") return [evRow("raw", "raw", raw)];

  if (ev.event === "attempt") {
    const bits = [
      ev.backend,
      ev.at && new Date(ev.at).toLocaleString(),
      ev.definition_version && `definition @ ${String(ev.definition_version.metadata).slice(0, 12)}/${String(ev.definition_version.description).slice(0, 12)}`,
    ].filter(Boolean).join(" · ");
    return [evRow("attempt", "attempt", bits || "work session started")];
  }

  if (ev.type === "system")
    return [evRow("session", "session", [ev.subtype, ev.model].filter(Boolean).join(" · "),
                  detailsJson(ev, "details"))];

  if (ev.type === "assistant" || ev.type === "user") {
    const blocks = ev.message?.content;
    if (!Array.isArray(blocks))
      return [evRow(ev.type, ev.type, textOf(blocks) || "", detailsJson(ev, "raw event"))];
    const rows = [];
    for (const b of blocks) {
      if (b.type === "text" && (b.text || "").trim()) {
        rows.push(evRow("claude", "claude", b.text.trim()));
      } else if (b.type === "thinking" && (b.thinking || "").trim()) {
        // A marker, not an element: renderLog merges runs of these into one row.
        rows.push({ thinking: b.thinking.trim() });
      } else if (b.type === "tool_use") {
        const inp = JSON.stringify(b.input ?? {});
        rows.push(evRow("tool", "tool", `${toolName(b.name)} ${inp.length <= 100 ? inp : ""}`.trim(),
                        inp.length > 100 ? detailsJson(b.input, "input") : null));
      } else if (b.type === "tool_result") {
        const t = textOf(b.content) || "(empty result)";
        rows.push(evRow("toolres", "result", trunc(t, 400),
                        t.length > 400 ? detailsText(t, "full result") : null));
      }
    }
    return rows;
  }

  if (ev.type === "result") {
    const ok = ev.subtype === "success";
    const bits = [
      ev.subtype,
      ev.num_turns != null && `${ev.num_turns} turns`,
      ev.duration_ms != null && `${(ev.duration_ms / 1000).toFixed(1)}s`,
      ev.total_cost_usd != null && `$${ev.total_cost_usd.toFixed(2)}`,
    ].filter(Boolean).join(" · ");
    return [evRow(ok ? "done" : "failed", ok ? "done" : "failed", bits,
                  ev.result ? detailsText(String(ev.result), "final message") : null)];
  }

  return [evRow("raw", ev.type || ev.event || "event", "", detailsJson(ev, "raw event"))];
}

function evRow(cls, tag, text, extra) {
  const d = document.createElement("div");
  d.className = `ev ${cls}`;
  const t = document.createElement("span");
  t.className = `tag ${cls}`;
  t.textContent = tag;
  d.appendChild(t);
  if (text) {
    const s = document.createElement("span");
    s.className = "evtext";
    s.textContent = text;
    d.appendChild(s);
  }
  if (extra) d.appendChild(extra);
  return d;
}

// Tool-result / message content can be a plain string or a list of text blocks.
function textOf(content) {
  if (typeof content === "string") return content;
  if (Array.isArray(content))
    return content.map(c => (typeof c === "string" ? c : c?.text || "")).join("\n");
  return null;
}

const toolName = name => (name || "?").replace(/^mcp__[^_]+__/, "");
const trunc = (s, n) => (s.length > n ? s.slice(0, n) + " …" : s);

function detailsJson(obj, label) {
  return detailsText(JSON.stringify(obj, null, 2), label);
}
function detailsText(text, label) {
  const det = document.createElement("details");
  const sum = document.createElement("summary");
  sum.textContent = label;
  const pre = document.createElement("pre");
  pre.textContent = text;
  det.append(sum, pre);
  return det;
}

function section(title, content) {
  const s = document.createElement("section");
  const h = document.createElement("h3");
  h.textContent = title;
  s.append(h, content);
  return s;
}

// --- pan & zoom ---------------------------------------------------------------

function applyTransform() {
  $("vp").setAttribute("transform", `translate(${tf.x} ${tf.y}) scale(${tf.k})`);
}

function fit(xy) {
  const svg = $("svg").getBoundingClientRect();
  let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  for (const p of xy.values()) {
    x0 = Math.min(x0, p.x); y0 = Math.min(y0, p.y);
    x1 = Math.max(x1, p.x + NODE_W); y1 = Math.max(y1, p.y + NODE_H);
  }
  const pad = 48;
  tf.k = Math.min(1, (svg.width - pad * 2) / (x1 - x0), (svg.height - pad * 2) / (y1 - y0));
  tf.x = (svg.width - (x1 - x0) * tf.k) / 2 - x0 * tf.k;
  tf.y = (svg.height - (y1 - y0) * tf.k) / 2 - y0 * tf.k;
}

{
  const svg = $("svg");
  let pan = null;
  svg.addEventListener("pointerdown", ev => {
    // A press on a card is a click-in-waiting, not a pan: capturing the
    // pointer here would retarget the click to the svg and eat the selection.
    if (ev.target instanceof Element && ev.target.closest(".card")) return;
    pan = { x: ev.clientX, y: ev.clientY, tx: tf.x, ty: tf.y, moved: false };
    svg.classList.add("panning");
    svg.setPointerCapture(ev.pointerId);
  });
  svg.addEventListener("pointermove", ev => {
    if (!pan) return;
    const dx = ev.clientX - pan.x, dy = ev.clientY - pan.y;
    if (Math.abs(dx) + Math.abs(dy) > 3) pan.moved = true;
    tf.x = pan.tx + dx;
    tf.y = pan.ty + dy;
    applyTransform();
  });
  svg.addEventListener("pointerup", ev => {
    svg.classList.remove("panning");
    if (pan && !pan.moved && ev.target === svg) select(null);
    pan = null;
  });
  svg.addEventListener("wheel", ev => {
    ev.preventDefault();
    const k = Math.min(3, Math.max(0.1, tf.k * Math.exp(-ev.deltaY * 0.0015)));
    const r = svg.getBoundingClientRect();
    const mx = ev.clientX - r.left, my = ev.clientY - r.top;
    tf.x = mx - ((mx - tf.x) / tf.k) * k;
    tf.y = my - ((my - tf.y) / tf.k) * k;
    tf.k = k;
    applyTransform();
  }, { passive: false });
  document.addEventListener("keydown", ev => { if (ev.key === "Escape") select(null); });
}

// --- data loop ----------------------------------------------------------------

async function load() {
  try {
    const res = await fetch("/api/graph");
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || res.statusText);
    data = body;
    if (selected && !body.nodes.some(n => n.id === selected)) selected = null;
    render();
    $("refresh").className = "live";
  } catch (e) {
    $("refresh").className = "err";
    $("refresh").title = `refresh failed: ${e.message}`;
  }
}

selected = location.hash.slice(1) || null;
load();
setInterval(load, 4000);
</script>
